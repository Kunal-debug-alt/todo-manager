{% extends 'tasks/base.html' %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6">Delete Project</h2>
        <p class="mb-6">Are you sure you want to delete the project: <strong>"{{ project.name }}"</strong>?</p>
        <p class="text-sm text-red-500 mb-6">Warning: Deleting this project will also delete all associated tasks.</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-end space-x-4">
                <a href="{% url 'tasks:project_list' %}" class="bg-slate-200 text-slate-800 px-4 py-2 rounded-lg hover:bg-slate-300">Cancel</a>
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
