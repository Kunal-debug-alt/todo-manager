{% extends 'tasks/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white dark:bg-slate-900/50 glass p-10 rounded-3xl border border-slate-200/50 dark:border-slate-800/50 shadow-2xl">
        <div class="flex items-center space-x-4 mb-8">
            <div class="w-12 h-12 bg-primary-100 dark:bg-primary-900/40 rounded-2xl flex items-center justify-center text-primary-600 dark:text-primary-400 shadow-inner">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2z"></path></svg>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">{% if object %}Update Project{% else %}Create New Project{% endif %}</h2>
                <p class="text-sm text-slate-500">Define your project and start collaborating.</p>
            </div>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label for="id_name" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 px-1">Project Name</label>
                    {{ form.name }}
                </div>
            </div>

            <div class="pt-6 border-t border-slate-200/50 dark:border-slate-800/50 flex space-x-4">
                <button type="submit" class="flex-1 bg-primary-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-primary-500/25 hover:bg-primary-700 hover:-translate-y-0.5 transition-all">
                    {% if object %}Save Changes{% else %}Create Project{% endif %}
                </button>
                <a href="{% url 'tasks:project_list' %}" class="px-6 py-3 rounded-2xl font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    input[type="text"] {
        width: 100%;
        padding: 0.875rem 1.25rem;
        border-radius: 1.25rem;
        border: 1px solid rgba(203, 213, 225, 0.5);
        background-color: #fbfcfd;
        color: #0f172a;
        transition: all 0.2s;
        font-size: 0.875rem;
        outline: none;
    }
    .dark input[type="text"] {
        border-color: rgba(71, 85, 105, 0.5);
        background-color: #020617;
        color: #f8fafc;
    }
    input:focus {
        border-color: #0ea5e9;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        background-color: white;
    }
    .dark input:focus {
        background-color: #020617;
    }
</style>
{% endblock content %}
