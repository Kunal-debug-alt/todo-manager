<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-30 hidden" onclick="toggleSidebar()"></div>
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 transform -translate-x-full transition duration-300 ease-in-out bg-white dark:bg-slate-900 p-6 border-r border-slate-200 dark:border-slate-700 z-40 flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">To-Do Manager</h1>
                <button onclick="toggleSidebar()" class="text-slate-500 hover:text-red-500 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <nav class="flex-1">
                <ul>
                    <li><a href="{% url 'tasks:task_list' %}" class="flex items-center py-2 px-4 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">All Tasks</a></li>
                    <li><a href="{% url 'tasks:project_list' %}" class="flex items-center py-2 px-4 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Projects</a></li>
                </ul>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-200 dark:border-slate-700">
                {% if user.is_authenticated %}
                    <p class="mb-2">Hello, {{ user.username }}</p>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm text-slate-500 hover:text-indigo-600 bg-transparent border-none p-0 cursor-pointer">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm text-slate-500 hover:text-indigo-600">Login</a>
                {% endif %}
            </div>
        </aside>

        <!-- Main Workspace -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="flex items-center justify-between p-4 px-8 bg-white dark:bg-slate-800/50 shadow-sm">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="text-slate-500 hover:text-indigo-600 focus:outline-none mr-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">To-Do Manager</h1>
                </div>
            </header>

            <!-- Main Content -->
            <main class="flex-1 p-8 overflow-y-auto w-full">
                {% block content %}
                {% endblock content %}
            </main>
        </div>
    </div>

    <div id="toast-root" class="fixed bottom-6 right-6 space-y-2 z-50"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        (function () {
            const toastRoot = document.getElementById('toast-root');

            function showToast(message) {
                if (!toastRoot) return;
                const el = document.createElement('div');
                el.className = 'max-w-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-md rounded-lg px-4 py-3 text-sm';
                el.textContent = message;
                toastRoot.appendChild(el);
                setTimeout(() => {
                    el.remove();
                }, 4500);
            }

            const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
            let wsUrl = `${scheme}://${window.location.host}/ws/user/`;
            
            // Check if we are in a project scope to connect to the project channel
            const meta = document.getElementById('realtime-meta');
            const projectId = meta && meta.dataset.projectId ? meta.dataset.projectId : null;
            if (projectId) {
                wsUrl = `${scheme}://${window.location.host}/ws/project/${projectId}/`;
            }

            let socket;
            try {
                socket = new WebSocket(wsUrl);
                window.socket = socket; // Expose globally for chat inputs
            } catch (e) {
                return;
            }

            socket.onmessage = (event) => {
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch (e) {
                    return;
                }

                window.dispatchEvent(new CustomEvent('realtime', { detail: data }));

                if (data && data.type === 'notify' && data.message) {
                    showToast(data.message);
                }
            };
        })();
    </script>
</body>
</html>
