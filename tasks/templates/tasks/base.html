<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white dark:bg-slate-800/50 p-6 border-r border-slate-200 dark:border-slate-700">
            <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 mb-8">To-Do Manager</h1>
            <nav>
                <ul>
                    <li><a href="{% url 'tasks:task_list' %}" class="flex items-center py-2 px-4 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">All Tasks</a></li>
                    <li><a href="{% url 'tasks:project_list' %}" class="flex items-center py-2 px-4 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Projects</a></li>
                </ul>
            </nav>
            <div class="absolute bottom-6">
                {% if user.is_authenticated %}
                    <p>Hello, {{ user.username }}</p>
                    <a href="{% url 'logout' %}" class="text-sm text-slate-500 hover:text-indigo-600">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm text-slate-500 hover:text-indigo-600">Login</a>
                {% endif %}
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            {% block content %}
            {% endblock content %}
        </main>
    </div>
</body>
</html>
